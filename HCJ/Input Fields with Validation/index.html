<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="design">
      <form id="myForm">
        <div class="form-group">
          <label>Name:</label>
          <input type="text" name="name" autocomplete="name" />
          <p class="error"></p>
        </div>

        <div class="form-group">
          <label>Email:</label>
          <input type="email" name="email" />
          <p class="error"></p>
        </div>

        <div class="form-group">
          <label>Password:</label>
          <input type="password" name="password" />
          <p class="error"></p>
        </div>

        <div class="form-group">
          <label>Date of Birth:</label>
          <input type="date" name="dob" />
          <p class="error"></p>
        </div>

        <div class="form-group">
          <label>Age:</label>
          <input type="number" name="age" />
          <p class="error"></p>
        </div>

        <div class="form-group">
          <label>Courses:</label><br />
          <label
            ><input type="checkbox" name="course" value="html" /> HTML</label
          >
          <label><input type="checkbox" name="course" value="css" /> CSS</label>
          <label><input type="checkbox" name="course" value="js" /> JS</label>
          <p class="error"></p>
        </div>

        <div class="form-group">
          <label>Gender:</label><br />
          <label><input type="radio" name="gender" value="male" /> Male</label>
          <label
            ><input type="radio" name="gender" value="female" /> Female</label
          >
          <label
            ><input type="radio" name="gender" value="other" /> LGBTQIA+</label
          >
          <p class="error"></p>
        </div>

        <div class="form-group">
          <label>Favorite Color:</label>
          <input type="color" name="favColor" />
          <p class="error"></p>
        </div>

        <button type="submit">Submit</button>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
